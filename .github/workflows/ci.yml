name: CI

on:
  push:
  pull_request:

jobs:
  test-windows-powershell:
    name: Test on Windows PowerShell 5.1
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Pester
        shell: powershell
        run: |
          Install-Module Pester -Scope CurrentUser -Force -SkipPublisherCheck

      - name: Run tests
        shell: powershell
        run: |
          Import-Module Pester -MinimumVersion 5.0 -Force
          Invoke-Pester ./tests -CI

  test-powershell-7:
    name: Test on PowerShell 7
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Pester
        shell: pwsh
        run: |
          Install-Module Pester -Scope CurrentUser -Force -SkipPublisherCheck

      - name: Run tests
        shell: pwsh
        run: |
          Import-Module Pester -MinimumVersion 5.0 -Force
          Invoke-Pester ./tests -CI